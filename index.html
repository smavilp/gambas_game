<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Genética de Gambas</title>

<style>
body {
  background:#0a2a43;
  color:white;
  text-align:center;
  font-family:Arial;
}

.tank {
  width:600px;
  height:300px;
  background:#1e90ff;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  border:4px solid white;
}

.shrimp {
  width:20px;
  height:20px;
  position:absolute;
  cursor:pointer;
  border-radius:4px;
  display:flex;
  align-items:center;
}

.selected {
  outline:2px solid yellow;
  transform: scale(1.3);
}

.tail {
  width:8px;
  height:8px;
  background:inherit;
  margin-left:-4px;
  animation: wag 0.4s infinite alternate;
}

@keyframes wag {
  0% { transform: rotate(-25deg); }
  100% { transform: rotate(25deg); }
}

.goal {
  width:40px;
  height:40px;
  margin:10px auto;
  border:2px solid white;
}

button {
  padding:10px 20px;
  font-size:18px;
  cursor:pointer;
}
</style>

</head>
<body>

<h2>🦐 Genética de Gambas</h2>
<p>Selecciona 2 gambas y presiona "Cruzar"</p>

<h3>🎯 Objetivo</h3>
<div id="goalBox" class="goal"></div>

<div class="tank" id="tank"></div>

<button onclick="cruzar()">Cruzar</button>

<script>
let tank = document.getElementById("tank");
let seleccionadas = [];
let gambas = [];
let objetivo;

// 🎨 convertir color
function rgb(c){
  return `rgb(${c.r},${c.g},${c.b})`;
}

// 🎯 generar objetivo
function generarObjetivo(){
  objetivo = {
    r: Math.floor(Math.random()*256),
    g: Math.floor(Math.random()*256),
    b: Math.floor(Math.random()*256)
  };

  document.getElementById("goalBox").style.background = rgb(objetivo);
}

// 📏 distancia entre colores
function distancia(c1, c2){
  return Math.sqrt(
    (c1.r - c2.r)**2 +
    (c1.g - c2.g)**2 +
    (c1.b - c2.b)**2
  );
}

// 🦐 crear gamba
function crearGamba(g){
  let div = document.createElement("div");
  div.className="shrimp";
  div.style.background = rgb(g.color);

  let tail = document.createElement("div");
  tail.className="tail";
  div.appendChild(tail);

  div.onclick = ()=>toggle(g);

  tank.appendChild(div);
  g.el = div;
  gambas.push(g);

  // 🎯 verificar objetivo
  if(distancia(g.color, objetivo) < 40){
    alert("🎉 ¡Lograste el color objetivo!");
    generarObjetivo();
  }
}

// 🖱 selección
function toggle(g){
  let i = seleccionadas.indexOf(g);

  if(i>=0) seleccionadas.splice(i,1);
  else if(seleccionadas.length<2) seleccionadas.push(g);

  gambas.forEach(x=>{
    x.el.classList.toggle("selected", seleccionadas.includes(x));
  });
}

// 🧬 mezcla
function mezclar(a,b){
  return {
    r:Math.floor((a.r+b.r)/2),
    g:Math.floor((a.g+b.g)/2),
    b:Math.floor((a.b+b.b)/2)
  };
}

// 🧬 cruzar
function cruzar(){
  if(seleccionadas.length!=2){
    alert("Selecciona 2 gambas");
    return;
  }

  let [a,b] = seleccionadas;

  let n = Math.floor(Math.random()*6);

  if(n===0) alert("No hubo crías 😢");

  for(let i=0;i<n;i++){

    let r = Math.random();
    let c;

    if(r<0.5){
      c = mezclar(a.color,b.color);
    } else if(r<0.75){
      c = {...a.color};
    } else {
      c = {...b.color};
    }

    // 🎨 mutación suave
    c.r += Math.floor((Math.random()-0.5)*20);
    c.g += Math.floor((Math.random()-0.5)*20);
    c.b += Math.floor((Math.random()-0.5)*20);

    c.r = Math.max(0, Math.min(255,c.r));
    c.g = Math.max(0, Math.min(255,c.g));
    c.b = Math.max(0, Math.min(255,c.b));

    crearGamba({
      id:Date.now()+i,
      color:c,
      x:Math.random()*580,
      y:Math.random()*280,
      vx:(Math.random()-0.5)*0.5,
      vy:(Math.random()-0.5)*0.5
    });
  }

  seleccionadas=[];
}

// 🦐 movimiento
function loop(){
  gambas.forEach(g=>{

    g.x += g.vx;
    g.y += g.vy;

    if(g.x<0 || g.x>580) g.vx *= -1;
    if(g.y<0 || g.y>280) g.vy *= -1;

    // movimiento orgánico
    g.vx += (Math.random()-0.5)*0.01;
    g.vy += (Math.random()-0.5)*0.01;

    let angle = Math.atan2(g.vy, g.vx);
    g.el.style.transform = `rotate(${angle}rad)`;

    g.el.style.left = g.x+"px";
    g.el.style.top = g.y+"px";
  });

  requestAnimationFrame(loop);
}

// 🎨 iniciales
crearGamba({id:1,color:{r:255,g:0,b:0},x:50,y:50,vx:0.3,vy:0.2});
crearGamba({id:2,color:{r:0,g:0,b:255},x:150,y:80,vx:-0.3,vy:0.2});
crearGamba({id:3,color:{r:0,g:255,b:0},x:250,y:120,vx:0.2,vy:-0.3});
crearGamba({id:4,color:{r:255,g:255,b:0},x:350,y:60,vx:-0.2,vy:-0.3});

generarObjetivo();
loop();
</script>

</body>
</html>
