<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gambas Game</title>

<style>
body {
  background: linear-gradient(to bottom, #e6f7ff, #cceeff);
  color:#1b2a3a;
  text-align:center;
  font-family:Arial;
  margin:0;
}

.tank {
  width:600px;
  height:300px;
  background: linear-gradient(to bottom, #b3ecff, #80dfff);
  margin:20px auto;
  position:relative;
  overflow:hidden;
  border:4px solid white;
  border-radius:12px;
}

.shrimp {
  position:absolute;
  width:30px;
  height:14px;
  display:flex;
  align-items:center;
  transform-origin:center;
  cursor:pointer;
}

.segment {
  width:8px;
  height:12px;
  background:inherit;
  border-radius:3px;
  margin-right:1px;
}

.head {
  width:10px;
  height:12px;
  background:inherit;
  border-radius:4px;
  position:relative;
}

.eye {
  width:3px;
  height:3px;
  background:black;
  border-radius:50%;
  position:absolute;
  right:2px;
  top:3px;
}

.tail {
  width:6px;
  height:6px;
  background:inherit;
  margin-right:2px;
  animation: wag 0.25s infinite alternate;
}

@keyframes wag {
  0% { transform: rotate(-20deg); }
  100% { transform: rotate(20deg); }
}

.selected {
  outline:2px solid yellow;
}

#pool {
  width:200px;
  border:2px dashed #aaccee;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:center;
}

.pool-shrimp {
  transform: scale(1.8);
  position:static !important;
}
</style>

</head>
<body>

<h2>🦐 Gambas Game</h2>
<h3>💰 Monedas: <span id="coins">50</span></h3>

<div style="display:flex; justify-content:center; gap:40px;">

  <div>
    <h3>🦐 Pool</h3>
    <div id="pool"></div>
  </div>

  <div>
    <h3>🐠 Tanque</h3>
    <div class="tank" id="tank"></div>
  </div>

</div>

<br>

<button onclick="cruzar()">🧬 Cruzar</button>
<button onclick="venderGambaTanque()">💸 Vender seleccionada</button>

<script>
let tank = document.getElementById("tank");
let pool = document.getElementById("pool");

let gambas = [];
let seleccionadas = [];
let monedas = 50;
let gambaSeleccionadaTanque = null;

function actualizarMonedas(){
  document.getElementById("coins").innerText = monedas;
}

function randomColor(){
  return {
    r:Math.floor(Math.random()*256),
    g:Math.floor(Math.random()*256),
    b:Math.floor(Math.random()*256)
  };
}

function rgb(c){
  return `rgb(${c.r},${c.g},${c.b})`;
}

// 🦐 POOL
function crearGambaPool(){

  let g = {
    id: crypto.randomUUID(),
    color: randomColor()
  };

  let div = document.createElement("div");
  div.className = "shrimp pool-shrimp";

  let color = rgb(g.color);

  let tail = document.createElement("div");
  tail.className = "tail";
  tail.style.background = color;
  div.appendChild(tail);

  for(let i=0;i<2;i++){
    let seg = document.createElement("div");
    seg.className = "segment";
    seg.style.background = color;
    div.appendChild(seg);
  }

  let head = document.createElement("div");
  head.className = "head";
  head.style.background = color;

  let eye = document.createElement("div");
  eye.className = "eye";
  head.appendChild(eye);

  div.appendChild(head);

  // comprar
  div.addEventListener("dblclick", function(){

    if(monedas < 5){
      alert("No tienes monedas");
      return;
    }

    monedas -= 5;
    actualizarMonedas();

    pool.removeChild(div);

    crearGamba({
      id: g.id,
      color: g.color,
      x: Math.random()*580,
      y: Math.random()*280,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4
    });

    crearGambaPool();
  });

  pool.appendChild(div);
}

// 🐠 TANQUE
function crearGamba(g){

  let div = document.createElement("div");
  div.className = "shrimp";

  let color = rgb(g.color);

  let tail = document.createElement("div");
  tail.className = "tail";
  tail.style.background = color;
  div.appendChild(tail);

  for(let i=0;i<2;i++){
    let seg = document.createElement("div");
    seg.className = "segment";
    seg.style.background = color;
    div.appendChild(seg);
  }

  let head = document.createElement("div");
  head.className = "head";
  head.style.background = color;

  let eye = document.createElement("div");
  eye.className = "eye";
  head.appendChild(eye);

  div.appendChild(head);

  // seleccionar
  div.addEventListener("click", function(){

    gambas.forEach(x=>x.el.classList.remove("selected"));

    div.classList.add("selected");
    gambaSeleccionadaTanque = g;
  });

  tank.appendChild(div);

  g.el = div;
  gambas.push(g);
}

// 💸 vender
function venderGambaTanque(){

  if(!gambaSeleccionadaTanque){
    alert("Selecciona una gamba");
    return;
  }

  let g = gambaSeleccionadaTanque;

  tank.removeChild(g.el);
  gambas = gambas.filter(x=>x!==g);

  monedas += 4;
  actualizarMonedas();

  gambaSeleccionadaTanque = null;
}

// 🧬 cruzar
function mezclar(a,b){
  return {
    r:Math.floor((a.r+b.r)/2),
    g:Math.floor((a.g+b.g)/2),
    b:Math.floor((a.b+b.b)/2)
  };
}

function cruzar(){

  if(gambas.length < 2){
    alert("Necesitas al menos 2 gambas");
    return;
  }

  let a = gambas[Math.floor(Math.random()*gambas.length)];
  let b = gambas[Math.floor(Math.random()*gambas.length)];

  let c = mezclar(a.color,b.color);

  crearGamba({
    id:Date.now(),
    color:c,
    x:Math.random()*580,
    y:Math.random()*280,
    vx:(Math.random()-0.5)*0.4,
    vy:(Math.random()-0.5)*0.4
  });
}

// movimiento
function loop(){
  gambas.forEach(g=>{
    g.x += g.vx;
    g.y += g.vy;

    if(g.x<0||g.x>580) g.vx*=-1;
    if(g.y<0||g.y>280) g.vy*=-1;

    g.el.style.left = g.x+"px";
    g.el.style.top = g.y+"px";

    let angle = Math.atan2(g.vy, g.vx);
    g.el.style.transform = `rotate(${angle}rad)`;
  });

  requestAnimationFrame(loop);
}

// init
for(let i=0;i<10;i++) crearGambaPool();
actualizarMonedas();
loop();
</script>

</body>
</html>
