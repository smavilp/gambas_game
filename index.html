<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gambas Game</title>

<style>
body {
  background: linear-gradient(to bottom, #e6f7ff, #cceeff);
  color:#1b2a3a;
  text-align:center;
  font-family:Arial;
  min-height: 100vh;
  margin: 0;
  user-select: none;
}

.tank {
  width:600px;
  height:300px;
  background: linear-gradient(to bottom, #b3ecff, #80dfff);
  margin:20px auto;
  position:relative;
  overflow:hidden;
  border:4px solid #ffffff;
  border-radius:12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.shrimp {
  position:absolute;
  width:30px;
  height:14px;
  display:flex;
  align-items:center;
  transform-origin:center;
  cursor:pointer;
}

.segment {
  width:8px;
  height:12px;
  background:inherit;
  border-radius:3px;
  margin-right:1px;
}

.head {
  width:10px;
  height:12px;
  background:inherit;
  border-radius:4px;
  position:relative;
}

.eye {
  width:3px;
  height:3px;
  background:black;
  border-radius:50%;
  position:absolute;
  right:2px;
  top:3px;
}

.tail {
  width:6px;
  height:6px;
  background:inherit;
  border-radius:2px;
  margin-right:2px;
  animation: wag 0.25s infinite alternate;
}

@keyframes wag {
  0% { transform: rotate(-20deg); }
  100% { transform: rotate(20deg); }
}

.selected {
  outline:2px solid yellow;
}

.goal {
  width:40px;
  height:40px;
  margin:10px auto;
  border:2px solid white;
}

.pool-shrimp {
  transform: scale(1.8);
  position: static !important;
}

#pool {
  width:200px;
  min-height:300px;
  border:2px dashed #aaccee;
  padding:10px;
  display:flex;
  flex-direction: column;
  gap:20px;
  align-items:center;
}
</style>

</head>
<body>

<h2>🦐 Gambas Game</h2>
<h3>💰 Monedas: <span id="coins">50</span></h3>
<p>🖱 Click: seleccionar | Doble click: comprar | Espacio: vender</p>

<h3>🎯 Objetivo</h3>
<div id="goal" class="goal"></div>

<div style="display:flex; justify-content:center; gap:40px; align-items:flex-start;">

  <div>
    <h3>🦐 Gambas disponibles</h3>
    <div id="pool"></div>
  </div>

  <div>
    <h3>🐠 Tanque</h3>
    <div class="tank" id="tank"></div>
  </div>

</div>

<button onclick="cruzar()">Cruzar</button>

<script>
let tank = document.getElementById("tank");
let pool = document.getElementById("pool");

let gambas = [];
let seleccionadas = [];
let objetivo;
let monedas = 50;

// 🔥 NUEVO
let gambaSeleccionadaPool = null;

function actualizarMonedas(){
  document.getElementById("coins").innerText = monedas;
}

function randomColor(){
  return {
    r:Math.floor(Math.random()*256),
    g:Math.floor(Math.random()*256),
    b:Math.floor(Math.random()*256)
  };
}

function rgb(c){
  return `rgb(${c.r},${c.g},${c.b})`;
}

function distancia(a,b){
  return Math.sqrt(
    (a.r-b.r)**2 +
    (a.g-b.g)**2 +
    (a.b-b.b)**2
  );
}

function generarObjetivo(){
  objetivo = randomColor();
  document.getElementById("goal").style.background = rgb(objetivo);
}

// 🦐 POOL
function crearGambaPool(){

  let g = {
    id: crypto.randomUUID(),
    color: randomColor()
  };

  let div = document.createElement("div");
  div.className = "shrimp pool-shrimp";

  let color = rgb(g.color);

  let tail = document.createElement("div");
  tail.className = "tail";
  tail.style.background = color;
  div.appendChild(tail);

  for(let i=0;i<2;i++){
    let seg = document.createElement("div");
    seg.className = "segment";
    seg.style.background = color;
    div.appendChild(seg);
  }

  let head = document.createElement("div");
  head.className = "head";
  head.style.background = color;

  let eye = document.createElement("div");
  eye.className = "eye";
  head.appendChild(eye);

  div.appendChild(head);

  // 🟡 seleccionar
  div.addEventListener("click", function(){
    document.querySelectorAll(".pool-shrimp").forEach(el=>{
      el.style.outline = "none";
    });

    div.style.outline = "3px solid red";
    gambaSeleccionadaPool = { div, g };
  });

  // 🟢 comprar
  div.addEventListener("dblclick", function(){

    if(monedas < 5){
      alert("💸 No tienes suficientes monedas");
      return;
    }

    monedas -= 5;
    actualizarMonedas();

    pool.removeChild(div);

    crearGamba({
      id: g.id,
      color: g.color,
      x: Math.random()*580,
      y: Math.random()*280,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4
    });

    crearGambaPool();
  });

  pool.appendChild(div);
}

// ⌨️ vender con espacio
document.addEventListener("keydown", function(e){

  if(e.code === "Space"){

    if(!gambaSeleccionadaPool) return;

    let { div } = gambaSeleccionadaPool;

    monedas += 3;
    actualizarMonedas();

    pool.removeChild(div);
    crearGambaPool();

    gambaSeleccionadaPool = null;
  }
});

// 🦐 TANQUE
function crearGamba(g){
  let div = document.createElement("div");
  div.className = "shrimp";

  let color = rgb(g.color);

  let tail = document.createElement("div");
  tail.className = "tail";
  tail.style.background = color;
  div.appendChild(tail);

  for(let i=0;i<2;i++){
    let seg = document.createElement("div");
    seg.className = "segment";
    seg.style.background = color;
    div.appendChild(seg);
  }

  let head = document.createElement("div");
  head.className = "head";
  head.style.background = color;

  let eye = document.createElement("div");
  eye.className = "eye";
  head.appendChild(eye);

  div.appendChild(head);

  div.onclick = ()=>toggle(g);

  tank.appendChild(div);

  g.el = div;
  gambas.push(g);
}

function toggle(g){
  let i = seleccionadas.indexOf(g);

  if(i>=0) seleccionadas.splice(i,1);
  else if(seleccionadas.length<2) seleccionadas.push(g);

  gambas.forEach(x=>{
    x.el.classList.toggle("selected", seleccionadas.includes(x));
  });
}

function mezclar(a,b){
  return {
    r:Math.floor((a.r+b.r)/2),
    g:Math.floor((a.g+b.g)/2),
    b:Math.floor((a.b+b.b)/2)
  };
}

function cruzar(){
  if(seleccionadas.length!=2){
    alert("Selecciona 2 gambas");
    return;
  }

  let [a,b] = seleccionadas;

  let n = Math.floor(Math.random()*6);

  for(let i=0;i<n;i++){
    let c = Math.random()<0.5 ? mezclar(a.color,b.color) : {...a.color};

    crearGamba({
      id:Date.now()+i,
      color:c,
      x:Math.random()*580,
      y:Math.random()*280,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4
    });

    if(distancia(c, objetivo) < 40){
      alert("🎉 ¡Objetivo logrado!");
      generarObjetivo();
    }
  }
}

function loop(){
  gambas.forEach(g=>{
    g.x += g.vx;
    g.y += g.vy;

    if(g.x<0||g.x>580) g.vx*=-1;
    if(g.y<0||g.y>280) g.vy*=-1;

    g.el.style.left = g.x+"px";
    g.el.style.top = g.y+"px";

    let angle = Math.atan2(g.vy, g.vx);
    g.el.style.transform = `rotate(${angle}rad)`;
  });

  requestAnimationFrame(loop);
}

// INIT
for(let i=0;i<10;i++) crearGambaPool();

generarObjetivo();
actualizarMonedas();
loop();
</script>

</body>
</html>
