<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gambas Game</title>

<style>
body {
  background:#0a2a43;
  color:white;
  text-align:center;
  font-family:Arial;
}

.tank {
  width:600px;
  height:300px;
  background:#1e90ff;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  border:4px solid white;
}

.shrimp {
  width:26px;
  height:14px;

  position:absolute;
  cursor:pointer;

  border-radius:6px; /* forma más orgánica */
  display:flex;
  align-items:center;
  justify-content:center;

  transform-origin: center;
  
  box-shadow: inset -3px 0 0 rgba(0,0,0,0.2);
}

.tail {
  width:6px;
  height:6px;
  background:inherit;

  position:absolute;
  left:-8px;

  animation: wag 0.3s infinite alternate;
}

@keyframes wag {
  0% { transform: rotate(-30deg); }
  100% { transform: rotate(30deg); }
}

@keyframes wag {
  0% { transform: rotate(-20deg); }
  100% { transform: rotate(20deg); }
}

.selected {
  outline:2px solid yellow;
}

.goal {
  width:40px;
  height:40px;
  margin:10px auto;
  border:2px solid white;
}
</style>

</head>
<body>

<h2>🦐 Gambas Game</h2>

<h3>🎯 Objetivo</h3>
<div id="goal" class="goal"></div>

<div class="tank" id="tank"></div>

<button onclick="cruzar()">Cruzar</button>

<script>
let tank = document.getElementById("tank");
let gambas = [];
let seleccionadas = [];
let objetivo;

// 🎨 color aleatorio
function randomColor(){
  return {
    r:Math.floor(Math.random()*256),
    g:Math.floor(Math.random()*256),
    b:Math.floor(Math.random()*256)
  };
}

// 🎨 convertir a CSS
function rgb(c){
  return `rgb(${c.r},${c.g},${c.b})`;
}

// 📏 distancia entre colores
function distancia(a,b){
  return Math.sqrt(
    (a.r-b.r)**2 +
    (a.g-b.g)**2 +
    (a.b-b.b)**2
  );
}

// 🎯 generar objetivo
function generarObjetivo(){
  objetivo = randomColor();
  document.getElementById("goal").style.background = rgb(objetivo);
}

// 🦐 crear gamba
function crearGamba(g){
  let div = document.createElement("div");
  div.className = "shrimp";
  div.style.background = rgb(g.color);

  let tail = document.createElement("div");
  tail.className = "tail";
  div.appendChild(tail);

  div.onclick = () => toggle(g);

  tank.appendChild(div);

  g.el = div;
  gambas.push(g);
}

// 🖱 selección
function toggle(g){
  let i = seleccionadas.indexOf(g);

  if(i >= 0){
    seleccionadas.splice(i,1);
  } else if(seleccionadas.length < 2){
    seleccionadas.push(g);
  }

  gambas.forEach(x=>{
    x.el.classList.toggle("selected", seleccionadas.includes(x));
  });
}

// 🧬 mezcla de colores
function mezclar(a,b){
  return {
    r:Math.floor((a.r+b.r)/2),
    g:Math.floor((a.g+b.g)/2),
    b:Math.floor((a.b+b.b)/2)
  };
}

// 🧬 cruzar
function cruzar(){
  if(seleccionadas.length != 2){
    alert("Selecciona 2 gambas");
    return;
  }

  let [a,b] = seleccionadas;

  let n = Math.floor(Math.random()*6);

  if(n === 0){
    alert("No hubo crías 😢");
  }

  for(let i=0;i<n;i++){

    let c;

    if(Math.random() < 0.5){
      c = mezclar(a.color,b.color);
    } else {
      c = Math.random() < 0.5 ? {...a.color} : {...b.color};
    }

    // mutación leve
    c.r += Math.floor((Math.random()-0.5)*20);
    c.g += Math.floor((Math.random()-0.5)*20);
    c.b += Math.floor((Math.random()-0.5)*20);

    c.r = Math.max(0, Math.min(255,c.r));
    c.g = Math.max(0, Math.min(255,c.g));
    c.b = Math.max(0, Math.min(255,c.b));

    crearGamba({
      id:Date.now()+i,
      color:c,
      x:Math.random()*580,
      y:Math.random()*280,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4
    });

    // 🎯 verificar objetivo
    if(distancia(c, objetivo) < 40){
      alert("🎉 ¡Lograste el objetivo!");
      generarObjetivo();
    }
  }

  seleccionadas = [];
}

// 🦐 movimiento
function loop(){
  gambas.forEach(g=>{
    g.x += g.vx;
    g.y += g.vy;

    if(g.x < 0 || g.x > 580) g.vx *= -1;
    if(g.y < 0 || g.y > 280) g.vy *= -1;

    g.el.style.left = g.x + "px";
    g.el.style.top = g.y + "px";

    let angle = Math.atan2(g.vy, g.vx);
    g.el.style.transform = `rotate(${angle}rad)`;

    g.vx += (Math.random()-0.5)*0.02;
    g.vy += (Math.random()-0.5)*0.02;
  });

  requestAnimationFrame(loop);
}

// 🟢 inicial
crearGamba({id:1,color:{r:255,g:0,b:0},x:100,y:100,vx:0.3,vy:0.2});
crearGamba({id:2,color:{r:0,g:0,b:255},x:300,y:150,vx:-0.3,vy:0.2});

generarObjetivo();
loop();
</script>

</body>
</html>
