<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gambas Game</title>

<style>
body {
  background:#0a2a43;
  color:white;
  text-align:center;
  font-family:Arial;
}

.tank {
  width:600px;
  height:300px;
  background:#1e90ff;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  border:4px solid white;
}

.shrimp {
  position:absolute;
  width:30px;
  height:14px;

  display:flex;
  align-items:center;

  transform-origin:center;
  cursor:pointer;
}

.segment {
  width:8px;
  height:12px;
  background:inherit;
  border-radius:3px;
  margin-right:1px;
}

.head {
  width:10px;
  height:12px;
  background:inherit;
  border-radius:4px;
  position:relative;
}

.eye {
  width:3px;
  height:3px;
  background:black;
  border-radius:50%;
  position:absolute;
  right:2px;
  top:3px;
}

.tail {
  width:6px;
  height:6px;
  background:inherit;
  border-radius:2px;

  margin-right:2px;

  animation: wag 0.25s infinite alternate;
}

@keyframes wag {
  0% { transform: rotate(-30deg); }
  100% { transform: rotate(30deg); }
}

.selected {
  outline:2px solid yellow;
}

@keyframes wag {
  0% { transform: rotate(-30deg); }
  100% { transform: rotate(30deg); }
}

@keyframes wag {
  0% { transform: rotate(-20deg); }
  100% { transform: rotate(20deg); }
}

.selected {
  outline:2px solid yellow;
}

.goal {
  width:40px;
  height:40px;
  margin:10px auto;
  border:2px solid white;
}

.pool-shrimp {
  transform: scale(1.8);
  position: static !important;
  flex-direction: column;
  align-items: center;
}
</style>

</head>
<body>

<h2>🦐 Gambas Game</h2>

<h3>🎯 Objetivo</h3>
<div id="goal" class="goal"></div>

<div style="
  display:flex;
  justify-content:center;
  gap:40px;
  align-items:flex-start;
">

  <!-- 🦐 POOL -->
  <div>
    <h3>🦐 Gambas disponibles</h3>
    <div id="pool" style="
      width:200px;
      min-height:300px;
      border:2px dashed white;
      padding:10px;
      display:flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap:10px;
      align-items:center;
    "></div>
  </div>

  <!-- 🐠 TANQUE -->
  <div>
    <h3>🐠 Tanque</h3>
    <div class="tank" id="tank"></div>
  </div>

</div>



<button onclick="cruzar()">Cruzar</button>

<script>
let tank = document.getElementById("tank");
let gambas = [];
let seleccionadas = [];
let objetivo;
let pool = document.getElementById("pool");

// 🎨 color aleatorio
function randomColor(){
  return {
    r:Math.floor(Math.random()*256),
    g:Math.floor(Math.random()*256),
    b:Math.floor(Math.random()*256)
  };
}

// 🎨 convertir a CSS
function rgb(c){
  return `rgb(${c.r},${c.g},${c.b})`;
}

// 📏 distancia entre colores
function distancia(a,b){
  return Math.sqrt(
    (a.r-b.r)**2 +
    (a.g-b.g)**2 +
    (a.b-b.b)**2
  );
}

// 🎯 generar objetivo
function generarObjetivo(){
  objetivo = randomColor();
  document.getElementById("goal").style.background = rgb(objetivo);
}

function crearGambaPool(){

  let g = {
    id: crypto.randomUUID(),
    color: randomColor()
  };

  let div = document.createElement("div");
  div.className = "shrimp pool-shrimp";
  
  let color = rgb(g.color);

  // cola
  let tail = document.createElement("div");
  tail.className = "tail";
  tail.style.background = color;
  div.appendChild(tail);

  // segmentos
  for(let i=0;i<2;i++){
    let seg = document.createElement("div");
    seg.className = "segment";
    seg.style.background = color;
    div.appendChild(seg);
  }

  // cabeza
  let head = document.createElement("div");
  head.className = "head";
  head.style.background = color;

  let eye = document.createElement("div");
  eye.className = "eye";
  head.appendChild(eye);
  div.style.transform = "rotate(0deg)";
  div.appendChild(head);

  // 👇 CLICK = meter al tanque
  div.onclick = () => {
    pool.removeChild(div);

    crearGamba({
      id: g.id,
      color: g.color,
      x: Math.random()*580,
      y: Math.random()*280,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4
    });
  };

  pool.appendChild(div);
}

// 🦐 crear gamba
function crearGamba(g){

  let div = document.createElement("div");
  div.className = "shrimp";

  let color = rgb(g.color);

  // 🐟 cola
  let tail = document.createElement("div");
  tail.className = "tail";
  tail.style.background = color;
  div.appendChild(tail);

  // 🧱 segmentos
  for(let i=0;i<2;i++){
    let seg = document.createElement("div");
    seg.className = "segment";
    seg.style.background = color;
    div.appendChild(seg);
  }

  // 🦐 cabeza
  let head = document.createElement("div");
  head.className = "head";
  head.style.background = color;

  // 👀 ojo
  let eye = document.createElement("div");
  eye.className = "eye";
  head.appendChild(eye);

  div.appendChild(head);

  div.onclick = ()=>toggle(g);

  tank.appendChild(div);

  g.el = div;
  gambas.push(g);
}

// 🖱 selección
function toggle(g){
  let i = seleccionadas.indexOf(g);

  if(i >= 0){
    seleccionadas.splice(i,1);
  } else if(seleccionadas.length < 2){
    seleccionadas.push(g);
  }

  gambas.forEach(x=>{
    x.el.classList.toggle("selected", seleccionadas.includes(x));
  });
}

// 🧬 mezcla de colores
function mezclar(a,b){
  return {
    r:Math.floor((a.r+b.r)/2),
    g:Math.floor((a.g+b.g)/2),
    b:Math.floor((a.b+b.b)/2)
  };
}

// 🧬 cruzar
function cruzar(){
  if(seleccionadas.length != 2){
    alert("Selecciona 2 gambas");
    return;
  }

  let [a,b] = seleccionadas;

  let n = Math.floor(Math.random()*6);

  if(n === 0){
    alert("No hubo crías 😢");
  }

  for(let i=0;i<n;i++){

    let c;

    if(Math.random() < 0.5){
      c = mezclar(a.color,b.color);
    } else {
      c = Math.random() < 0.5 ? {...a.color} : {...b.color};
    }

    // mutación leve
    c.r += Math.floor((Math.random()-0.5)*20);
    c.g += Math.floor((Math.random()-0.5)*20);
    c.b += Math.floor((Math.random()-0.5)*20);

    c.r = Math.max(0, Math.min(255,c.r));
    c.g = Math.max(0, Math.min(255,c.g));
    c.b = Math.max(0, Math.min(255,c.b));

    crearGamba({
      id:Date.now()+i,
      color:c,
      x:Math.random()*580,
      y:Math.random()*280,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4
    });

    // 🎯 verificar objetivo
    if(distancia(c, objetivo) < 40){
      alert("🎉 ¡Lograste el objetivo!");
      generarObjetivo();
    }
  }

  seleccionadas = [];
}


// 🦐 movimiento
function loop(){
  gambas.forEach(g=>{
    g.x += g.vx;
    g.y += g.vy;

    if(g.x < 0 || g.x > 580) g.vx *= -1;
    if(g.y < 0 || g.y > 280) g.vy *= -1;

    g.el.style.left = g.x + "px";
    g.el.style.top = g.y + "px";

    let angle = Math.atan2(g.vy, g.vx);
    g.el.style.transform = `rotate(${angle}rad)`;

    g.vx += (Math.random()-0.5)*0.02;
    g.vy += (Math.random()-0.5)*0.02;
  });

  requestAnimationFrame(loop);
}
for(let i = 0; i < 6; i++){
  crearGambaPool();
}

generarObjetivo();
loop();
</script>

</body>
</html>
